<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Docs MCP - Documentation Search</title>
        <link rel="stylesheet" href="/css/main.css" />
    </head>
    <body>
        <div class="container">
            <header>
                <div class="header-content">
                    <div class="header-title">
                        <h1 data-i18n="app.title">Docs MCP</h1>
                        <p class="subtitle" data-i18n="app.subtitle">
                            Documentation indexing and search server
                        </p>
                    </div>
                    <div class="header-controls">
                        <select
                            id="language-select"
                            class="language-select"
                            aria-label="Select language"
                        >
                            <option value="en">English</option>
                            <option value="zh-CN">简体中文</option>
                        </select>
                        <button
                            id="theme-toggle"
                            class="theme-toggle"
                            aria-label="Toggle theme"
                        >
                            <svg
                                class="sun-icon"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                            >
                                <circle cx="12" cy="12" r="5"></circle>
                                <line x1="12" y1="1" x2="12" y2="3"></line>
                                <line x1="12" y1="21" x2="12" y2="23"></line>
                                <line
                                    x1="4.22"
                                    y1="4.22"
                                    x2="5.64"
                                    y2="5.64"
                                ></line>
                                <line
                                    x1="18.36"
                                    y1="18.36"
                                    x2="19.78"
                                    y2="19.78"
                                ></line>
                                <line x1="1" y1="12" x2="3" y2="12"></line>
                                <line x1="21" y1="12" x2="23" y2="12"></line>
                                <line
                                    x1="4.22"
                                    y1="19.78"
                                    x2="5.64"
                                    y2="18.36"
                                ></line>
                                <line
                                    x1="18.36"
                                    y1="5.64"
                                    x2="19.78"
                                    y2="4.22"
                                ></line>
                            </svg>
                            <svg
                                class="moon-icon"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                            >
                                <path
                                    d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"
                                ></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </header>

            <main>
                <!-- Page Navigation -->
                <nav class="page-nav">
                    <a href="#libraries-section" data-i18n="nav.libraries"
                        >Libraries</a
                    >
                    <a href="#jobs-section" data-i18n="nav.jobs">Jobs</a>
                    <a href="#scrape-section" data-i18n="nav.addLibrary"
                        >Add Library</a
                    >
                    <a href="#search-section" data-i18n="nav.search">Search</a>
                </nav>

                <!-- Libraries Section -->
                <section id="libraries-section" class="content-section">
                    <div class="section-header">
                        <h2 data-i18n="libraries.title">Indexed Libraries</h2>
                        <button
                            class="btn btn-secondary"
                            id="refresh-libraries"
                            data-i18n="libraries.refresh"
                        >
                            Refresh
                        </button>
                    </div>
                    <div id="libraries-list" class="card-list">
                        <p class="loading" data-i18n="libraries.loading">
                            Loading...
                        </p>
                    </div>
                </section>

                <!-- Jobs Section -->
                <section id="jobs-section" class="content-section">
                    <div class="section-header">
                        <h2 data-i18n="jobs.title">Active Jobs</h2>
                        <button
                            class="btn btn-secondary"
                            id="clear-jobs"
                            data-i18n="jobs.clearCompleted"
                        >
                            Clear Completed
                        </button>
                    </div>
                    <div id="jobs-list" class="card-list">
                        <p class="loading" data-i18n="jobs.empty">
                            No jobs running
                        </p>
                    </div>
                </section>

                <!-- Add Library Section -->
                <section id="scrape-section" class="content-section">
                    <h2 data-i18n="nav.addLibrary">Add New Library</h2>
                    <form id="scrape-form" class="form">
                        <div class="form-group">
                            <label for="url" data-i18n="form.url"
                                >Documentation URL</label
                            >
                            <input
                                type="url"
                                id="url"
                                name="url"
                                data-i18n-placeholder="form.urlPlaceholder"
                                placeholder="https://docs.example.com"
                                required
                            />
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label
                                    for="library"
                                    data-i18n="form.libraryName"
                                    >Library Name</label
                                >
                                <input
                                    type="text"
                                    id="library"
                                    name="library"
                                    data-i18n-placeholder="form.libraryPlaceholder"
                                    placeholder="my-library"
                                    required
                                />
                            </div>
                            <div class="form-group">
                                <label for="version" data-i18n="form.version"
                                    >Version (optional)</label
                                >
                                <input
                                    type="text"
                                    id="version"
                                    name="version"
                                    data-i18n-placeholder="form.versionPlaceholder"
                                    placeholder="latest"
                                />
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="max-pages" data-i18n="form.maxPages"
                                    >Max Pages</label
                                >
                                <input
                                    type="number"
                                    id="max-pages"
                                    name="max_pages"
                                    value="1000"
                                    min="1"
                                />
                            </div>
                            <div class="form-group">
                                <label for="max-depth" data-i18n="form.maxDepth"
                                    >Max Depth</label
                                >
                                <input
                                    type="number"
                                    id="max-depth"
                                    name="max_depth"
                                    value="3"
                                    min="1"
                                />
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label
                                    for="scrape-mode"
                                    data-i18n="form.scrapeMode"
                                    >Scrape Mode</label
                                >
                                <select id="scrape-mode" name="scrape_mode">
                                    <option
                                        value="browser"
                                        selected
                                        data-i18n="form.modeBrowser"
                                    >
                                        Browser (JavaScript support)
                                    </option>
                                    <option
                                        value="fetch"
                                        data-i18n="form.modeFetch"
                                    >
                                        Fetch (Fast, static only)
                                    </option>
                                </select>
                            </div>
                        </div>
                        <div class="form-actions">
                            <button
                                type="submit"
                                class="btn btn-primary"
                                data-i18n="form.startScraping"
                            >
                                Start Scraping
                            </button>
                        </div>
                    </form>
                </section>

                <!-- Search Section -->
                <section id="search-section" class="content-section">
                    <h2 data-i18n="search.title">Search Documentation</h2>
                    <div class="search-box">
                        <select id="search-library">
                            <option
                                value=""
                                data-i18n="search.loadingLibraries"
                            >
                                Loading libraries...
                            </option>
                        </select>
                        <input
                            type="text"
                            id="search-query"
                            data-i18n-placeholder="search.placeholder"
                            placeholder="Enter search query..."
                        />
                        <button
                            class="btn btn-primary"
                            id="search-btn"
                            data-i18n="search.button"
                        >
                            Search
                        </button>
                    </div>
                    <div id="search-results" class="search-results"></div>
                </section>
            </main>

            <!-- Toast Notification -->
            <div id="toast" class="toast hidden"></div>
        </div>

        <script src="/js/config.js"></script>
        <script src="/js/i18n.js"></script>
        <script src="/js/theme.js"></script>
        <script src="/js/api.js"></script>
        <script src="/js/ui.js"></script>
        <script src="/js/libraries.js"></script>
        <script src="/js/jobs.js"></script>
        <script src="/js/search.js"></script>
        <script src="/js/scrape.js"></script>
        <script src="/js/sse.js"></script>
        <script src="/js/app.js"></script>
    </body>
</html>
